<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Вставка с рекламой</title>
    <script>
        async function copyText() {
            await navigator.clipboard.writeText('<div>\n' +
                '    <a href="https://lexa-sosun.github.io/arkadiy">\n' +
                '        <img src="https://lexa-sosun.github.io/arkadiy/adv/adv.png" alt=""\n' +
                '             style="width: 400px; height: 400px; border-radius: 20px; border: 5px solid #adadad; padding: 10px;">\n' +
                '    </a>\n' +
                '</div>    ');
        }
    </script>
</head>
<body>
<div>
    <a href="https://lexa-sosun.github.io/arkadiy">
        <img src="https://lexa-sosun.github.io/arkadiy/adv/adv.png" alt=""
             style="width: 400px; height: 400px; border-radius: 20px; border: 5px solid #adadad; padding: 10px;">
    </a>
</div>
<br>
<button onclick="copyText()">Скопировать</button>
</body>
</html>
